name: Zampto-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00（UTC+8 → UTC 01:00）

jobs:
  run_zampto_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/zampto_renew.py zampto_renew.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            scrot \
            xdotool \
            jq \
            wget \
            unzip

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      # ---------- 替换后的代理启动步骤 ----------
      - name: 🚀 启动 Xray 代理（链接/JSON 全自动解析）
        if: ${{ env.PROXY_LINK != '' }}
        env:
          PROXY_LINK: ${{ secrets.PROXY_LINK }}
        run: |
          set -e

          # 1. 下载 Xray
          LATEST=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "📦 Xray 版本: $LATEST"
          wget -q "https://github.com/XTLS/Xray-core/releases/download/v${LATEST}/Xray-linux-64.zip"
          unzip -q Xray-linux-64.zip
          chmod +x xray

          # 2. 生成基础 config.json（入站 http 代理 + 出站占位）
          cat > config.json << 'EOF'
          {
            "log": { "loglevel": "warning" },
            "inbounds": [
              { "port": 8080, "protocol": "http", "settings": {} }
            ],
            "outbounds": [ { "protocol": "proxy", "settings": {} } ]
          }
          EOF

          # 3. 解析 PROXY_LINK
          if echo "$PROXY_LINK" | grep -q '^vmess://'; then
            echo "🔮 解析 vmess:// 链接"
            B64=$(echo "$PROXY_LINK" | sed 's/^vmess:\/\///' | tr -d '\n')
            while [ $((${#B64} % 4)) -ne 0 ]; do B64="${B64}="; done
            JSON=$(echo "$B64" | base64 -d 2>/dev/null || echo '{}')
            ADD=$(echo "$JSON" | jq -r '.add // ""')
            PORT=$(echo "$JSON" | jq -r '.port // "443"')
            ID=$(echo "$JSON" | jq -r '.id // ""')
            AID=$(echo "$JSON" | jq -r '.aid // "0"')
            NET=$(echo "$JSON" | jq -r '.net // "tcp"')
            TLS=$(echo "$JSON" | jq -r '.tls // ""')
            PATH=$(echo "$JSON" | jq -r '.path // "/"')
            HOST=$(echo "$JSON" | jq -r '.host // ""')
            cat > outbound.json << EOF
            {
              "protocol": "vmess",
              "settings": {
                "vnext": [{
                  "address": "$ADD",
                  "port": $PORT,
                  "users": [{
                    "id": "$ID",
                    "alterId": $AID,
                    "security": "auto"
                  }]
                }]
              },
              "streamSettings": {
                "network": "$NET",
                "security": "$TLS",
                "tlsSettings": $( [ "$TLS" == "tls" ] && echo '{"allowInsecure": true}' || echo '{}' ),
                "wsSettings": $( [ "$NET" == "ws" ] && echo "{\"path\":\"$PATH\",\"headers\":{\"Host\":\"$HOST\"}}" || echo '{}' )
              }
            }
            EOF

          elif echo "$PROXY_LINK" | grep -q '^vless://'; then
            echo "🔮 解析 vless:// 链接"
            python3 << 'PY'
            import os, sys, json, urllib.parse
            link = os.getenv("PROXY_LINK")
            if not link: sys.exit(0)
            u = urllib.parse.urlparse(link)
            params = dict(urllib.parse.parse_qsl(u.query))
            out = {
              "protocol": "vless",
              "settings": {
                "vnext": [{
                  "address": u.hostname,
                  "port": u.port or 443,
                  "users": [{
                    "id": u.username,
                    "encryption": params.get("encryption", "none"),
                    "flow": params.get("flow", "")
                  }]
                }]
              },
              "streamSettings": {
                "network": params.get("type", "tcp"),
                "security": params.get("security", ""),
                "tlsSettings": {"allowInsecure": True} if params.get("security") == "tls" else {},
                "wsSettings": {"path": params.get("path", "/"), "headers": {"Host": params.get("host", "")}} if params.get("type") == "ws" else {}
              }
            }
            with open("outbound.json", "w") as f:
                json.dump(out, f, indent=2)
            PY

          elif echo "$PROXY_LINK" | grep -q '^trojan://'; then
            echo "🔮 解析 trojan:// 链接"
            python3 << 'PY'
            import os, sys, json, urllib.parse
            link = os.getenv("PROXY_LINK")
            if not link: sys.exit(0)
            u = urllib.parse.urlparse(link)
            params = dict(urllib.parse.parse_qsl(u.query))
            out = {
              "protocol": "trojan",
              "settings": {
                "servers": [{
                  "address": u.hostname,
                  "port": u.port or 443,
                  "password": u.username,
                  "flow": params.get("flow", "")
                }]
              },
              "streamSettings": {
                "network": params.get("type", "tcp"),
                "security": params.get("security", "tls"),
                "tlsSettings": {"allowInsecure": True} if params.get("allowInsecure") == "1" else {},
                "wsSettings": {"path": params.get("path", "/"), "headers": {"Host": params.get("host", "")}} if params.get("type") == "ws" else {}
              }
            }
            with open("outbound.json", "w") as f:
                json.dump(out, f, indent=2)
            PY

          elif echo "$PROXY_LINK" | grep -q '^{'; then
            echo "📄 检测到 JSON 配置，直接覆盖"
            echo "$PROXY_LINK" > config.json
            touch outbound.json
          else
            echo "❌ 无法识别的代理格式"
            exit 1
          fi

          # 如果生成了 outbound.json，则合并到 config.json
          if [ -f outbound.json ]; then
            jq --slurpfile out outbound.json \
               '.inbounds = [{"port":8080,"protocol":"http","settings":{}}] | .outbounds = $out[0]' \
               config.json > config.tmp && mv config.tmp config.json
          fi

          # 4. 启动 Xray
          nohup ./xray -c config.json > xray.log 2>&1 &
          sleep 3

          # 5. 测试代理
          IP=$(curl -s -x http://127.0.0.1:8080 https://api.ipify.org || echo "未知")
          echo "✅ Xray 已启动，出口IP：$IP"

      # ---------- 后续步骤保持不变 ----------
      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          ZAMPTO_ACCOUNT: ${{ secrets.ZAMPTO_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python zampto_renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: "*.png"
          retention-days: 3
