name: Zampto-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00（UTC+8 → UTC 01:00）

jobs:
  run_zampto_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/zampto_renew.py zampto_renew.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            scrot \
            xdotool \
            jq \
            wget \
            unzip

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      # ---------- 代理启动步骤（修复版） ----------
      - name: 🚀 启动 Xray 代理（链接/JSON 全自动解析）
        if: ${{ env.PROXY_LINK != '' }}
        env:
          PROXY_LINK: ${{ secrets.PROXY_LINK }}
        run: |
          set -e

          # 1. 下载 Xray
          LATEST=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "📦 Xray 版本: $LATEST"
          wget -q "https://github.com/XTLS/Xray-core/releases/download/v${LATEST}/Xray-linux-64.zip"
          unzip -q Xray-linux-64.zip
          chmod +x xray

          # 2. 使用 Python 统一解析并生成 config.json（包含入站和出站）
          python3 << 'PYTHON'
          import os, sys, json, base64, urllib.parse

          link = os.getenv("PROXY_LINK", "").strip()
          if not link:
              sys.exit(0)

          # 默认入站配置
          config = {
              "log": { "loglevel": "warning" },
              "inbounds": [
                  { "port": 8080, "protocol": "http", "settings": {} }
              ]
          }

          # 解析出站
          outbound = None

          if link.startswith("vmess://"):
              print("🔮 解析 vmess:// 链接")
              b64 = link[8:].replace("\n", "").replace("\r", "")
              while len(b64) % 4 != 0:
                  b64 += "="
              try:
                  data = json.loads(base64.b64decode(b64).decode('utf-8'))
              except:
                  print("❌ vmess 解析失败")
                  sys.exit(1)
              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": data.get("add", ""),
                          "port": int(data.get("port", 443)),
                          "users": [{
                              "id": data.get("id", ""),
                              "alterId": int(data.get("aid", 0)),
                              "security": data.get("scy", "auto") or "auto"
                          }]
                      }]
                  },
                  "streamSettings": {
                      "network": data.get("net", "tcp"),
                      "security": data.get("tls", ""),
                      "tlsSettings": {"allowInsecure": True} if data.get("tls") == "tls" else {},
                      "wsSettings": {"path": data.get("path", "/"), "headers": {"Host": data.get("host", "")}} if data.get("net") == "ws" else {},
                      "httpSettings": {"path": data.get("path", "/")} if data.get("net") == "http" else {},
                      "grpcSettings": {"serviceName": data.get("path", "")} if data.get("net") == "grpc" else {}
                  }
              }

          elif link.startswith("vless://"):
              print("🔮 解析 vless:// 链接")
              u = urllib.parse.urlparse(link)
              params = dict(urllib.parse.parse_qsl(u.query))
              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": u.hostname,
                          "port": u.port or 443,
                          "users": [{
                              "id": u.username,
                              "encryption": params.get("encryption", "none"),
                              "flow": params.get("flow", "")
                          }]
                      }]
                  },
                  "streamSettings": {
                      "network": params.get("type", "tcp"),
                      "security": params.get("security", ""),
                      "tlsSettings": {"allowInsecure": True} if params.get("security") == "tls" else {},
                      "wsSettings": {"path": params.get("path", "/"), "headers": {"Host": params.get("host", "")}} if params.get("type") == "ws" else {},
                      "httpSettings": {"path": params.get("path", "/")} if params.get("type") == "http" else {},
                      "grpcSettings": {"serviceName": params.get("serviceName", "")} if params.get("type") == "grpc" else {}
                  }
              }

          elif link.startswith("trojan://"):
              print("🔮 解析 trojan:// 链接")
              u = urllib.parse.urlparse(link)
              params = dict(urllib.parse.parse_qsl(u.query))
              outbound = {
                  "protocol": "trojan",
                  "settings": {
                      "servers": [{
                          "address": u.hostname,
                          "port": u.port or 443,
                          "password": u.username,
                          "flow": params.get("flow", "")
                      }]
                  },
                  "streamSettings": {
                      "network": params.get("type", "tcp"),
                      "security": params.get("security", "tls"),
                      "tlsSettings": {"allowInsecure": True} if params.get("allowInsecure") == "1" else {},
                      "wsSettings": {"path": params.get("path", "/"), "headers": {"Host": params.get("host", "")}} if params.get("type") == "ws" else {},
                      "httpSettings": {"path": params.get("path", "/")} if params.get("type") == "http" else {},
                      "grpcSettings": {"serviceName": params.get("serviceName", "")} if params.get("type") == "grpc" else {}
                  }
              }

          elif link.startswith("{"):
              # 直接使用用户提供的完整 JSON 配置
              try:
                  config = json.loads(link)
                  # 确保入站端口为 8080
                  if "inbounds" in config:
                      for inbound in config["inbounds"]:
                          if inbound.get("protocol") == "http":
                              inbound["port"] = 8080
                  print("📄 使用用户提供的 JSON 配置")
                  with open("config.json", "w") as f:
                      json.dump(config, f, indent=2)
                  sys.exit(0)
              except:
                  print("❌ JSON 配置解析失败")
                  sys.exit(1)

          else:
              print("❌ 无法识别的代理格式")
              sys.exit(1)

          # 如果有出站，则合并到 config
          if outbound:
              config["outbounds"] = [outbound]
              print("✅ 代理配置解析成功")

          # 写入 config.json
          with open("config.json", "w") as f:
              json.dump(config, f, indent=2)
          PYTHON

          # 3. 启动 Xray
          nohup ./xray -c config.json > xray.log 2>&1 &
          sleep 3

          # 4. 测试代理
          IP=$(curl -s -x http://127.0.0.1:8080 https://api.ipify.org || echo "未知")
          echo "✅ Xray 已启动，出口IP：$IP"

      # ---------- 后续步骤保持不变 ----------
      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          ZAMPTO_ACCOUNT: ${{ secrets.ZAMPTO_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python zampto_renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: "*.png"
          retention-days: 3
