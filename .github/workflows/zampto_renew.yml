name: Zampto-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 北京时间09:00

permissions:
  contents: read

jobs:
  run_zampto_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
          path: private

      - name: 📂 移动脚本到工作目录
        run: |
          if [ -f private/zampto_renew.py ]; then
            mv private/zampto_renew.py zampto_renew.py
          else
            echo "ERROR: private/zampto_renew.py not found"
            ls -la private || true
            exit 1
          fi

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            scrot \
            wget \
            ca-certificates

      - name: 🐍 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🛡️ 启动 GOST 代理转发
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        if: ${{ env.GOST_PROXY != '' }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')

          echo "📦 GOST Version: $VERSION"

          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost

          nohup ./gost \
            -L http://:8080 \
            -F "$GOST_PROXY" \
            > gost.log 2>&1 &

          sleep 3

          IP=$(curl -s -x http://127.0.0.1:8080 https://api.ipify.org || true)

          if [ -n "$IP" ]; then
            IP_MASKED=$(echo "$IP" | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1xx/')
            echo "✅ GOST 已启动"
            echo "🌐 出口 IP：$IP_MASKED"
          else
            echo "⚠️ GOST 已启动，但代理测试失败"
            cat gost.log || true
          fi

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          ZAMPTO_ACCOUNT: ${{ secrets.ZAMPTO_ACCOUNT }}
          ZAMPTO_PASSWORD: ${{ secrets.ZAMPTO_PASSWORD }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run \
            --auto-servernum \
            --server-args="-screen 0 1920x1080x24" \
            python zampto_renew.py 2>&1 | tee zampto_renew.log

      - name: 📄 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-logs-${{ github.run_id }}
          path: |
            gost.log
            zampto_renew.log
          retention-days: 3

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: |
            screenshots/*.png
          retention-days: 3
