name: Zampto-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

permissions:
  contents: write
  actions: write

jobs:
  run_zampto_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 下载公库代码
        uses: actions/checkout@v4

      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/Zampto_Renew.py zampto_renew.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb xdotool unzip

      - name: 🐍 安装 Python 依赖（确保 SeleniumBase 最新）
        run: |
          pip install --upgrade pip
          pip install --upgrade seleniumbase requests

      - name: 🛡️ 启动 VLESS 代理（Xray-core）
        env:
          VLESS_CONFIG: ${{ secrets.VLESS_CONFIG }}
        if: env.VLESS_CONFIG != ''
        run: |
          echo "📦 下载 Xray-core..."
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip
          chmod +x xray

          echo "📝 写入 VLESS 配置..."
          echo "$VLESS_CONFIG" > config.json

          echo "🚀 启动 Xray（监听 127.0.0.1:1080）..."
          nohup ./xray -c config.json > xray.log 2>&1 &
          sleep 5

          echo "🌐 测试代理连通性（SOCKS5）..."
          curl -s -x socks5h://127.0.0.1:1080 https://api.ipify.org \
            | sed 's/\([0-9]*\)\..*/\1.*.*.*/' || echo "⚠️ 代理测试失败"

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          ZAMPTO_ACCOUNT: ${{ secrets.ZAMPTO_USER }}
          ZAMPTO_PASSWORD: ${{ secrets.ZAMPTO_PASS }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          PROXY: socks5://127.0.0.1:1080
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python zampto_renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: "*.png"
          retention-days: 3

      - name: 📝 更新运行时间文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "最新运行时间：$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          if git diff --cached --quiet; then 
            echo "无变化，无需提交"
          else 
            git commit -m "⏱️ 更新时间文件: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: 🧹 清理旧的运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
