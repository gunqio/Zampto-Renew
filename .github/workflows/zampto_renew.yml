name: Zampto-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00（UTC+8 → UTC 01:00）

jobs:
  run_zampto_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/zampto_renew.py zampto_renew.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            scrot \
            xdotool \
            jq \
            wget \
            unzip

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      # ---------- 替换为旧版正常的 Xray 代理步骤 ----------
      - name: 🛡️ 启动 Xray 代理转发 (链接/JSON 智能全自动解析)
        env:
          VMESS_LINK: ${{ secrets.VMESS_LINK }}
        run: |
          if [ -z "${VMESS_LINK}" ]; then
            echo "❌ 错误：GitHub Secrets 中缺少 VMESS_LINK 配置！"
            exit 1
          fi

          # 1. 智能判定是 vmess:// 还是原生 JSON
          if [[ "${VMESS_LINK}" == vmess://* ]]; then
            echo "🔮 检测到 vmess:// 协议链接，开始进行 Base64 解码..."
            CLEAN_B64=$(echo "${VMESS_LINK}" | sed 's/vmess:\/\///' | tr -d '\r\n ')
            JSON_STR=$(echo "${CLEAN_B64}" | base64 -d 2>/dev/null || echo "${CLEAN_B64}=" | base64 -d 2>/dev/null || echo "${CLEAN_B64}==" | base64 -d 2>/dev/null)
          else
            echo "📄 检测到原生 JSON 文本，直接提取参数..."
            JSON_STR="${VMESS_LINK}"
          fi

          # 验证 JSON 解析是否合法
          if ! echo "${JSON_STR}" | jq . >/dev/null 2>&1; then
            echo "❌ 错误：节点数据解码失败或 JSON 格式不合法！"
            exit 1
          fi

          # 2. 提取 Xray 所需的核心变量
          V_ADD=$(echo "${JSON_STR}" | jq -r '.add')
          V_PORT=$(echo "${JSON_STR}" | jq -r '.port')
          V_ID=$(echo "${JSON_STR}" | jq -r '.id')
          V_HOST=$(echo "${JSON_STR}" | jq -r '.host // .sni')
          V_PATH=$(echo "${JSON_STR}" | jq -r '.path')

          # 3. 下载并解压 Xray 核心
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q xray.zip && chmod +x xray
          
          # 4. 生成 Xray 标准 config.json
          cat << EOF > config.json
          {
            "inbounds": [{
              "port": 10809,
              "protocol": "http",
              "listen": "127.0.0.1"
            }],
            "outbounds": [{
              "protocol": "vmess",
              "settings": {
                "vnext": [{
                  "address": "${V_ADD}",
                  "port": ${V_PORT:-443},
                  "users": [{
                    "id": "${V_ID}",
                    "alterId": 0,
                    "security": "none"
                  }]
                }]
              },
              "streamSettings": {
                "network": "ws",
                "security": "tls",
                "tlsSettings": {
                  "serverName": "${V_HOST}",
                  "allowInsecure": false
                },
                "wsSettings": {
                  "path": "${V_PATH}",
                  "headers": {
                    "Host": "${V_HOST}"
                  }
                }
              }
            }]
          }
          EOF
          
          # 5. 后台静默启动 Xray
          nohup ./xray -config config.json > xray.log 2>&1 &
          sleep 4
          
          # 6. 测试连通性
          echo "✅ Xray 代理已在本地 10809 端口启动，正在测试出口 IP..."
          curl -s -x http://127.0.0.1:10809 https://api.ipify.org || echo "⚠️ 连通测试失败，请确认节点是否有效"

      # ---------- 后续步骤保持不变 ----------
      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          ZAMPTO_ACCOUNT: ${{ secrets.ZAMPTO_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python zampto_renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: "*.png"
          retention-days: 3
