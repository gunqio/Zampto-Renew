name: Zampto-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

permissions:
  contents: write
  actions: write

jobs:
  run_zampto_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 下载公库代码
        uses: actions/checkout@v4

      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/zampto_renew.py zampto_renew.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb xdotool unzip

      - name: 🐍 安装 Python 依赖
        run: pip install seleniumbase requests

      - name: 🛡️ 启动 Xray 代理转发 (变量动态注入版)
        env:
          # 在这里统一管理你的 VMess 节点变量（也可以移到 GitHub Secrets 中）
          VMESS_ADD: "saas.sin.fan"
          VMESS_PORT: 443
          VMESS_ID: "42e35455-abdb-4b51-830e-7a4e24e50a81"
          VMESS_HOST: "ministrator.koko.xx.kg"
          VMESS_PATH: "/vmess-argo?ed=2560"
        run: |
          # 1. 下载并解压 Xray 核心
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q xray.zip
          chmod +x xray
          
          # 2. 通过环境变量动态生成 config.json
          cat << EOF > config.json
          {
            "inbounds": [{
              "port": 10809,
              "protocol": "http",
              "listen": "127.0.0.1"
            }],
            "outbounds": [{
              "protocol": "vmess",
              "settings": {
                "vnext": [{
                  "address": "${VMESS_ADD}",
                  "port": ${VMESS_PORT},
                  "users": [{
                    "id": "${VMESS_ID}",
                    "alterId": 0,
                    "security": "none"
                  }]
                }]
              },
              "streamSettings": {
                "network": "ws",
                "security": "tls",
                "tlsSettings": {
                  "serverName": "${VMESS_HOST}",
                  "allowInsecure": false
                },
                "wsSettings": {
                  "path": "${VMESS_PATH}",
                  "headers": {
                    "Host": "${VMESS_HOST}"
                  }
                }
              }
            }]
          }
          EOF
          
          # 3. 后台静默启动 Xray
          nohup ./xray -config config.json > xray.log 2>&1 &
          sleep 4
          
          # 4. 测试连通性
          echo "✅ Xray 代理已在本地 10809 端口启动，正在测试出口 IP..."
          curl -s -x http://127.0.0.1:10809 https://api.ipify.org || echo "⚠️ 连通测试失败，请检查节点可用性"

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          ZAMPTO_USER: ${{ secrets.ZAMPTO_USER }}
          ZAMPTO_PASS: ${{ secrets.ZAMPTO_PASS }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          HTTP_PROXY: http://127.0.0.1:10809
          http_proxy: http://127.0.0.1:10809
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python zampto_renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: "*.png"
          retention-days: 3

      - name: 📝 更新运行时间文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "最新运行时间：$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" > time.txt
          
          git add time.txt
          if git diff --cached --quiet; then 
            echo "无变化，无需提交"
          else 
            git commit -m "⏱️ 更新时间文件: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: 🧹 清理旧的运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
